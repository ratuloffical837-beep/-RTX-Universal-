<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RTX SMM Dashboard Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <h2>RTX SMM PANEL</h2>
        
        <div class="balance-card">
            <p>আপনার অ্যাকাউন্ট ব্যালেন্স</p>
            <h1 id="balance">⏳ লোড হচ্ছে...</h1>
        </div>

        <div class="section">
            <h3>🚀 ইনস্ট্যান্ট কমেন্ট অর্ডার</h3>
            <input type="text" id="postLink" placeholder="ফেসবুক পোস্ট বা ভিডিও লিংক">
            <input type="number" id="commentCount" placeholder="কমেন্টের সংখ্যা (প্রতি কমেন্ট ২ টাকা)">
            <button class="btn" id="orderBtn" onclick="placeOrder()">অর্ডার কনফার্ম করুন</button>
        </div>

        <div class="section">
            <h3>💰 ম্যানুয়াল ডিপোজিট গেটওয়ে</h3>
            <p style="font-size:12px; color:#ff9500; text-align:center; font-weight:bold; margin-bottom: 12px;">বিকাশ/নগদ পার্সোনাল: 01725218874X</p>
            <input type="number" id="depAmount" placeholder="টাকার পরিমাণ (৳)">
            <input type="text" id="txid" placeholder="Transaction ID (TxID)">
            <button class="btn btn-dep" id="depBtn" onclick="submitDeposit()">ডিপোজিট রিকোয়েস্ট সাবমিট</button>
        </div>

        <div class="section">
            <button class="btn btn-support" onclick="contactAdmin()">💬 লাইভ কাস্টমার সাপোর্ট</button>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
    </html>
